upstream bso_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    root /var/www/bso-tinder/dist;
    index index.html;

    # ── Статика: долгое кэширование для хэшированных файлов Vite ──────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|ico|webp|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Service Worker: никогда не кэшировать ─────────────────────────────
    location ~* (sw\.js|workbox-.*\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ── manifest / index: короткий TTL ────────────────────────────────────
    location ~* (manifest\.webmanifest|manifest\.json|index\.html)$ {
        expires 10m;
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }

    # ── API: проксируем на Node.js ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://bso_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── SPA fallback: все остальные пути на index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/manifest+json image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_vary       on;

    # ── Безопасность ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;
}
