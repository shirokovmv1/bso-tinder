name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build frontend × 2 ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (PROD)
        run: npx vite build --outDir dist-prod
        env:
          VITE_APP_ENV: prod

      - name: Build frontend (TEST)
        run: npx vite build --outDir dist-test
        env:
          VITE_APP_ENV: test

      # ── 3. Configure SSH ─────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── 4. Upload files to server ────────────────────────────────────────────
      - name: Ensure rsync on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "which rsync || apt-get install -y rsync -q"

      - name: Upload frontend builds
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist-prod/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/bso-tinder/dist-prod/
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist-test/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/bso-tinder/dist-test/

      - name: Upload backend source
        run: |
          rsync -az --delete \
            --exclude='node_modules' \
            --exclude='*.db' \
            --exclude='logs/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            server/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/bso-tinder/server/

      - name: Upload docker-compose and configs
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            docker-compose.yml Dockerfile nginx.prod.conf nginx.test.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/bso-tinder/

      # ── 5. Rebuild & restart containers ─────────────────────────────────────
      - name: Rebuild Docker images and restart
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /var/www/bso-tinder && docker compose build --no-cache bso-api-prod bso-api-test && docker compose up -d"

      # ── 6. Smoke test ────────────────────────────────────────────────────────
      - name: Wait for health checks
        run: sleep 15

      - name: Smoke test PROD
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "curl -sf http://localhost:80/api/health | grep -q 'ok'"

      - name: Smoke test TEST
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "curl -sf http://localhost:8080/api/health | grep -q 'ok'"
